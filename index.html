<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID_ARCHIVE // LAPIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --glitch-color: #ff0000;
            --primary: #d1d1d1;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            /* 2️⃣ Кастомный курсор */
            cursor: url('https://example.com/cursed-eye-cursor.png'), auto;
        }

        /* Эффект сканирования и наложения */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff00;
            padding: 20px;
        }

        /* 1️⃣ Glitch-эффект при переходе */
        .glitch-transition {
            filter: contrast(150%) brightness(1.5) hue-rotate(90deg);
            transform: skew(1deg, 1deg) translate(2px, -1px);
        }

        /* 5️⃣ Скрытый смысл */
        .hidden-meaning {
            color: transparent;
            position: relative;
            cursor: help;
        }
        .hidden-meaning:hover::after {
            content: attr(data-meaning);
            color: #ff0;
            position: absolute;
            left: 0; top: 0;
            white-space: nowrap;
            z-index: 50;
        }

        /* 6️⃣ Mirror страница - «ломка» */
        @keyframes mirror-break {
            0% {transform: rotate(0deg) skew(0deg);}
            50% {transform: rotate(2deg) skew(5deg); opacity:0.7;}
            100% {transform: rotate(-1deg) skew(-3deg); opacity:1;}
        }

        /* 7️⃣ CRT эффект шапки */
        header .glitch {
            text-shadow: 0 0 1px #fff, 0 0 2px #0f0, 0 0 3px #f00;
            animation: crt-glitch 0.1s infinite alternate;
            position: relative;
            display: inline-block;
        }
        @keyframes crt-glitch {
            0% {text-shadow: 0 0 1px #fff, 0 0 2px #0f0;}
            50% {text-shadow: 0 0 2px #ff0, 0 0 1px #0ff;}
            100% {text-shadow: 0 0 3px #f0f, 0 0 2px #0f0;}
        }

        /* 3️⃣ Индикатор «печатает...» */
        .typing-indicator {
            font-style: italic;
            opacity: 0.6;
            animation: blink 1s infinite;
            font-size: 10px;
            margin-top: 20px;
        }
        @keyframes blink { 0%, 50%, 100% {opacity:0.6;} 25%, 75% {opacity:0;} }

        /* Прочее */
        .viewport-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'), 
                        radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            opacity: 0.4;
            z-index: -1;
        }
        .scan-line {
            width: 100%; height: 100px; z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%;
            animation: scan 8s linear infinite;
        }
        @keyframes scan { 0% { bottom: 100%; } 100% { bottom: -100%; } }

        .sidebar-link { transition: all 0.3s ease; border-left: 2px solid transparent; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.05); color: #fff; padding-left: 1rem; border-left: 2px solid #fff; }

        .btn-branch {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            text-align: center;
            transition: all 0.3s;
            display: block;
            text-decoration: none;
            color: inherit;
            font-size: 0.75rem;
        }
        .btn-branch:hover { background: #fff; color: #000; }

        .whisper {
            position: fixed;
            font-size: 10px;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
            animation: fade 6s linear forwards;
        }
        @keyframes fade { 0% { opacity: 0; } 50% { opacity: 0.1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="boot-screen">
        <div id="boot-log" class="text-xs md:text-sm leading-loose"></div>
    </div>

    <div class="viewport-background"></div>
    <div class="scan-line"></div>

    <div class="max-w-7xl mx-auto h-full flex flex-col border border-white/10 relative overflow-hidden bg-black/40 backdrop-blur-sm">
        
        <header class="border-b border-white/10 p-4 flex justify-between items-center bg-black/60">
            <div class="flex items-center gap-4">
                <span class="text-[10px] opacity-50 uppercase tracking-widest">Status: <span class="text-green-500">Online</span></span>
                <button id="fullscreen-btn" class="text-[10px] opacity-50 hover:opacity-100 uppercase tracking-widest border border-white/20 px-2">[ 10️⃣ Fullscreen ]</button>
            </div>
            <div class="glitch font-bold tracking-widest text-sm" data-text="LAPIN SYSTEM v2.0">LAPIN SYSTEM v2.0</div>
            <div class="text-[10px] opacity-50 font-mono" id="clock">00:00:00</div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <nav class="w-72 border-r border-white/10 p-6 flex flex-col gap-2 bg-black/40 overflow-y-auto">
                <div class="text-[9px] uppercase tracking-widest opacity-30 mb-4 font-bold border-b border-white/10 pb-2">Directories</div>
                <a href="#vzaidkost" class="sidebar-link p-2 text-xs opacity-60">/root/vzaidkost</a>
                <a href="#murmure-de-vide" class="sidebar-link p-2 text-xs opacity-60">/root/murmure-de-vide</a>
                <a href="#ili" class="sidebar-link p-2 text-xs opacity-60">/root/ili</a>
                <a href="#foryouhaaa" class="sidebar-link p-2 text-xs opacity-60">/root/foryouhaaa</a>
                <a href="#limite" class="sidebar-link p-2 text-xs opacity-60">/root/limite</a>
                
                <div class="mt-2 px-2">
                    <div class="text-[8px] opacity-20 mb-1">SIGNAL_STRENGTH</div>
                    <div id="signal-bar" style="width:100%;height:4px;background:#0f0;transition: all 0.5s;"></div>
                </div>

                <div class="mt-6 text-[9px] uppercase tracking-widest opacity-30 font-bold border-b border-white/10 pb-2">Security</div>
                <a href="#mirror_1788" class="sidebar-link p-2 text-xs text-red-400 opacity-80">/root/mirror_1788</a>
            </nav>

            <main class="flex-1 overflow-y-auto p-12 relative">
                <div id="view-container" class="max-w-3xl mx-auto opacity-0 transition-all duration-700 transform translate-y-4"></div>
            </main>
        </div>

        <footer class="border-t border-white/10 p-2 text-[8px] flex justify-between px-6 bg-black/90">
            <div class="opacity-20 uppercase tracking-tighter">Syndicate Engine // Void Protocols Active</div>
            <div id="mute-btn" class="cursor-pointer opacity-50 hover:opacity-100">AUDIO_TOGGLE</div>
            <div class="opacity-20 uppercase tracking-widest">"ответ — это то, что ты сам унесёшь"</div>
        </footer>
    </div>

    <script>
        const DATA = {
            'vzaidkost': {
                title: 'LAPIN // VZAIDKOST',
                content: `
                    <div class="space-y-8">
                        <div class="border-l-2 border-white/20 pl-6 py-4 italic text-lg opacity-90 leading-relaxed">архив неслучившегося</div>
                        <div class="space-y-6 text-sm opacity-70 leading-relaxed">
                            <p>здесь правда — <span class="hidden-meaning" data-meaning="подсказка: это отражение тишины">не в строчках, а в паузе меж них</span>,<br>где эхо без голоса стелется в тишь.</p>
                            <p class="text-white font-bold py-4 border-y border-white/5">ты ищешь названья? его тут не жди,<br>оно растворилось в безликой груди.</p>
                        </div>
                    </div>`
            },
            'murmure-de-vide': {
                title: 'DIRECTORY // AUUDDVORDU',
                content: `<div class="space-y-6 text-sm opacity-70"><p>здесь числа не знают порядка, а звук - чистоты.<br>здесь падают маски, касаясь немой черты.</p></div>`
            },
            'ili': {
                title: 'DIRECTORY // VOZZMEZDRR',
                content: `<div class="space-y-6 text-sm opacity-70"><p>здесь стерты границы — остался лишь голый каркас.<br>то, что должно случиться, случается прямо сейчас.</p></div>`
            },
            'foryouhaaa': {
                title: "Si vous êtes arrivé jusqu'ici...",
                content: `<div class="grid grid-cols-1 gap-4"><a href="https://t.me/reflexxxvm" target="_blank" class="btn-branch text-left">PATH_B: ou..par ici?</a></div>`
            },
            'limite': {
                title: 'EXPERIMENT // THE_VARIABLE',
                content: `
                    <p class="mb-8 text-sm italic opacity-60">Data analysis complete. The probability of an honest answer remains low.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <a href="..." class="btn-branch border-red-500 text-red-400 hover:bg-red-400 hover:text-black">A. TRUTH_HIDE</a>
                        <a href="..." class="btn-branch border-blue-500 text-blue-400 hover:bg-blue-400 hover:text-black">B. TRUTH_FEAR</a>
                        <a href="..." class="btn-branch border-green-500 text-green-400 hover:bg-green-400 hover:text-black">C. VARIABLE</a>
                    </div>`
            },
            'mirror_1788': {
                title: 'MIRROR_DECRYPTOR_#1788',
                content: `
                    <div class="bg-black/40 border border-white/5 p-6 font-mono text-xs tracking-[0.3em] mb-8 leading-loose" id="morse-box">
                        - .... .. ... / .. ... / -. --- - / .- / -.. .-. . .- --
                    </div>
                    <button onclick="runDecrypt()" id="dec-btn" class="border border-white/30 px-8 py-3 text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all">Decode</button>
                    <div id="dec-res" class="mt-10 text-xl font-bold tracking-[0.2em] text-white hidden glitch" data-text=""></div>`
            }
        };

        let started = false;

        // 1️⃣ Glitch-эффект
        function triggerGlitch() {
            const container = document.getElementById('view-container');
            container.classList.add('glitch-transition');
            setTimeout(() => container.classList.remove('glitch-transition'), 1000);
        }

        // 3️⃣ Индикатор «печатает...»
        function showTypingIndicator() {
            const container = document.getElementById('view-container');
            const el = document.createElement('div');
            el.className = 'typing-indicator';
            el.innerText = "Lapin печатает...";
            container.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        // 4️⃣ Разблокирование чатов
        function unlockChat(chatId) {
            const link = document.querySelector(`.sidebar-link[href="#${chatId}"]`);
            if(link) {
                link.style.opacity = '1';
                link.dataset.unlocked = 'true';
            }
        }

        // 6️⃣ Mirror страница
        function mirrorBreakAnimation() {
            const container = document.getElementById('view-container');
            container.style.animation = 'mirror-break 1s forwards';
        }

        // 9️⃣ Редкое сообщение (Whisper)
        function spawnWhisper(text) {
            const el = document.createElement('div');
            el.className = 'whisper';
            el.innerText = text || "ты здесь?..";
            el.style.left = Math.random() * 80 + "%";
            el.style.top = Math.random() * 80 + "%";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }

        // Рендер вью
        function renderView() {
            const hash = window.location.hash.replace('#', '') || 'vzaidkost';
            const container = document.getElementById('view-container');
            
            // 8️⃣ Signal Bar logic
            const bar = document.getElementById('signal-bar');
            const depth = Object.keys(DATA).indexOf(hash);
            bar.style.width = (100 - (depth * 15)) + "%";
            bar.style.background = depth > 3 ? "#f00" : "#0f0";

            triggerGlitch();
            
            container.classList.remove('opacity-100', 'translate-y-0');
            container.classList.add('opacity-0', 'translate-y-4');

            setTimeout(() => {
                const dataKey = (hash === 'mirror') ? 'mirror_1788' : hash;
                const data = DATA[dataKey] || DATA['vzaidkost'];
                
                if (hash === 'mirror' || hash === 'mirror_1788') mirrorBreakAnimation();
                
                container.innerHTML = `
                    <h2 class="text-3xl font-bold mb-12 tracking-tighter uppercase glitch" data-text="${data.title}">${data.title}</h2>
                    ${data.content}
                `;
                
                showTypingIndicator();
                container.classList.remove('opacity-0', 'translate-y-4');
                container.classList.add('opacity-100', 'translate-y-0');
            }, 400);
        }

        // Декодер
        function runDecrypt() {
            const res = document.getElementById('dec-res');
            const btn = document.getElementById('dec-btn');
            btn.innerHTML = "DECODING...";
            setTimeout(() => {
                const text = "THIS IS NOT A DREAM. SOMEONE IS WATCHING YOU, LAPIN.";
                res.innerHTML = text;
                res.setAttribute('data-text', text);
                res.classList.remove('hidden');
                btn.style.display = 'none';
                mirrorBreakAnimation();
            }, 2000);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            // Boot log
            const bootLog = document.getElementById('boot-log');
            bootLog.innerHTML = `<div>> INITIALIZING...</div><div>> ACCESSING VOID...</div><div>> SYSTEM_READY.</div>`;
            setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; }, 1500);

            // 🔟 Полноэкранный режим
            const fsBtn = document.getElementById('fullscreen-btn');
            fsBtn.onclick = () => {
                if(!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };

            // Часы
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
            }, 1000);

            // 9️⃣ Редкие сообщения
            setTimeout(() => spawnWhisper("ты всё ещё здесь?.."), 180000);
            setInterval(() => { if(Math.random() > 0.7) spawnWhisper(); }, 10000);

            renderView();
            window.addEventListener('hashchange', renderView);

            // Audio Toggle
            document.getElementById('mute-btn').onclick = () => {
                document.querySelectorAll('audio').forEach(a => a.muted = !a.muted);
            };

            // Start Audio on first click
            document.body.addEventListener('click', () => {
                if(!started) {
                    started = true;
                    const audio = document.getElementById('audio-vzaidkost');
                    if(audio) audio.play().catch(e => {});
                }
            });
        });
    </script>

    <audio id="audio-vzaidkost" src="https://mn1.sunproxy.net/file/.../Dead_Melodies.mp3" loop></audio>
</body>
</html>
